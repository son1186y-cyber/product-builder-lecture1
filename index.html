<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>네이버 플레이스 상권 분석 도구</title>
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>상권 분석 대시보드</h1>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="상권 또는 장소 입력 (예: 강남역, 홍대 카페)">
                <button id="searchButton">분석하기</button>
            </div>
        </header>

        <main class="dashboard">
            <div class="left-panel">
                <div class="card map-card">
                    <h2>상권 지도</h2>
                    <div id="map"></div>
                </div>
            </div>
            <div class="right-panel">
                <div class="card stats-card">
                    <h2>카테고리 비율</h2>
                    <canvas id="categoryChart"></canvas>
                </div>
                <div class="card list-card">
                    <h2>분석 결과 리스트</h2>
                    <div id="resultList" class="scrollable">
                        <p class="empty-msg">검색 결과가 없습니다. 상권을 검색해 보세요.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
